services:
  trainer:
    build: .
    image: building-llm-trainer

    # ipc: host gives the DataLoader workers access to the host's shared-memory
    # segment, avoiding "too many open files" / POSIX shm exhaustion that
    # happens inside containers when num_workers > 0.
    ipc: host

    volumes:
      # Bind-mount the config directory so that changes to YAML files on the
      # host take effect on the next `docker compose up` without a rebuild.
      - ./src/configs:/app/src/configs

      # Downloaded parquet shards, tokenised .npy caches, and the trained
      # tokenizer pickle.  The training config sets data_dir: "data/climbmix",
      # which resolves to /app/data/climbmix inside the container.
      # Persisting /app/data means shards and the tokenizer are never
      # re-downloaded or re-trained across container restarts.
      - climbmix_data:/app/data

      # HuggingFace Hub metadata, lock files, and any other cached assets
      # (no longer stores shards — those go to climbmix_data above).
      - hf_cache:/data/huggingface

      # Model checkpoints.  The training config sets checkpoint_dir:
      # "checkpoints", which resolves to /app/checkpoints inside the container.
      - checkpoints:/app/checkpoints

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  climbmix_data:
  hf_cache:
  checkpoints:
