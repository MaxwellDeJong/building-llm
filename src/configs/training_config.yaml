# Training hyperparameters for GPT pre-training on ClimbMix.
# All keys map directly to fields in TrainingConfig (src/training/trainer.py).

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
# torch.optim.Muon (PyTorch >= 2.10) is applied to 2-D weight matrices.
# AdamW is applied to embeddings, biases, and layer-norm parameters.
muon_lr: 0.02
adamw_lr: 3.0e-4
muon_momentum: 0.95
# Decoupled weight decay applied inside torch.optim.Muon before the gradient step.
muon_weight_decay: 0.1
adamw_betas: [0.9, 0.95]
adamw_weight_decay: 0.1
gradient_clip: 1.0

# ---------------------------------------------------------------------------
# Learning-rate schedule (linear warmup → cosine decay to 10 % of peak)
# ---------------------------------------------------------------------------
# max_steps is not configured here — it is derived automatically from the
# model parameter count using the Chinchilla scaling law (20 tokens per
# parameter), ensuring the compute budget matches the model size.
warmup_steps: 500

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
# Micro-batch size per gradient-accumulation step.
batch_size: 8
# Number of forward/backward passes before one optimizer step.
# Effective batch size = batch_size × gradient_accumulation_steps × context_length tokens.
gradient_accumulation_steps: 4
# Rows of ClimbMix reserved for validation / test (skipped during training).
n_val_examples: 5000
n_test_examples: 5000
# DataLoader worker processes per split (set to 0 to debug in the main process).
num_workers: 4

# ---------------------------------------------------------------------------
# Logging & checkpoints
# ---------------------------------------------------------------------------
# Steps between training-loss log lines.
log_interval: 50
# Steps between validation evaluations and checkpoint saves.
eval_interval: 500
# Batches averaged for each evaluation pass (train / val / test).
eval_iters: 100
# Directory for checkpoint files.
checkpoint_dir: checkpoints
# PyTorch device string.  Falls back to CPU if the device is unavailable.
device: cuda
