# Training hyperparameters for GPT pre-training on karpathy/climbmix-400b-shuffle.
# All keys map directly to fields in TrainingConfig (src/training/trainer.py).

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
# torch.optim.Muon (PyTorch >= 2.10) is applied to 2-D weight matrices.
# AdamW is applied to embeddings, biases, and layer-norm parameters.
muon_lr: 0.02
adamw_lr: 3.0e-4
muon_momentum: 0.95
# Decoupled weight decay applied inside torch.optim.Muon before the gradient step.
muon_weight_decay: 0.1
adamw_betas: [0.9, 0.95]
adamw_weight_decay: 0.1
gradient_clip: 1.0

# ---------------------------------------------------------------------------
# Learning-rate schedule (linear warmup → cosine decay to 10 % of peak)
# ---------------------------------------------------------------------------
warmup_steps: 500

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
# Root directory for downloaded parquet shards (raw/) and tokenised caches
# (tokens/). Subdirectories are created automatically on first run.
data_dir: data/climbmix

# Fraction of documents sampled from each downloaded shard for BPE tokenizer
# training. A small value (e.g. 0.01) is sufficient for learning good merges
# and keeps tokenizer training fast.
tokenizer_train_fraction: 0.01

batch_size: 8
gradient_accumulation_steps: 4

# Tokens reserved at the start of the first shard for val and test splits.
# 5_120_000 = 5 000 non-overlapping sequences at context_length=1024.
n_val_tokens: 5120000
n_test_tokens: 5120000

num_workers: 4

# ---------------------------------------------------------------------------
# Logging & checkpoints
# ---------------------------------------------------------------------------
log_interval: 50
eval_interval: 500
eval_iters: 100
checkpoint_dir: checkpoints
device: cuda
